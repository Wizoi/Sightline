<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="36%" r="68%">
      <stop offset="0" stop-color="#c8f2fd"/>
      <stop offset="0.45" stop-color="#4cc9f0"/>
      <stop offset="1" stop-color="#1f8fc0"/>
    </radialGradient>
    <clipPath id="eyeClip"><path d="M14,56 C22,24 98,24 106,56 C98,84 22,84 14,56 Z"/></clipPath>

    <!-- anime eye mark, note as pupil -->
    <g id="mark">
      <path d="M14,56 C22,24 98,24 106,56 C98,84 22,84 14,56 Z" fill="#0a0d12"/>
      <g clip-path="url(#eyeClip)">
        <circle cx="60" cy="56" r="35" fill="url(#iris)"/>
        <circle cx="60" cy="56" r="35" fill="none" stroke="#1f7fae" stroke-width="3.5"/>
        <path d="M67,60 V37" stroke="#0a0d12" stroke-width="5.5" stroke-linecap="round"/>
        <ellipse cx="56" cy="62" rx="11.5" ry="8.5" fill="#0a0d12" transform="rotate(-20 56 62)"/>
        <circle cx="48" cy="43" r="9.5" fill="#ffffff" opacity="0.95"/>
        <circle cx="70" cy="68" r="5" fill="#ffffff" opacity="0.85"/>
      </g>
      <path d="M13,56 C22,22 98,22 107,56" fill="none" stroke="#57d0f2" stroke-width="7.5" stroke-linecap="round"/>
      <path d="M101,49 L115,40 M100,55 L116,53 M103,44 L113,34" stroke="#57d0f2" stroke-width="4.2" stroke-linecap="round"/>
      <path d="M18,60 C32,79 88,79 102,60" fill="none" stroke="#1f7fae" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    </g>
  </defs>

  <rect width="960" height="560" fill="#0e1116"/>

  <!-- App icon tile -->
  <rect x="70" y="120" width="220" height="220" rx="46" fill="url(#tile)" stroke="#2b3442" stroke-width="1.5"/>
  <use href="#mark" transform="translate(84,124) scale(1.55)"/>

  <!-- Wordmark -->
  <g transform="translate(360,150)">
    <use href="#mark" transform="translate(0,-6) scale(0.78)"/>
    <text x="104" y="66" font-size="70" font-weight="700" letter-spacing="0.5" fill="#e6edf3">Sightline</text>
    <text x="106" y="104" font-size="22" font-weight="500" letter-spacing="3.5" fill="#8b949e">HANDS-FREE SIGHT-READING</text>
  </g>

  <!-- On-light variant -->
  <g transform="translate(360,330)">
    <rect x="-4" y="-4" width="476" height="150" rx="16" fill="#f4f7fb"/>
    <g transform="translate(20,20)">
      <use href="#mark" transform="scale(0.66)"/>
      <text x="90" y="58" font-size="58" font-weight="700" fill="#0e1116">Sightline</text>
      <text x="92" y="90" font-size="18" font-weight="500" letter-spacing="3" fill="#5b636e">HANDS-FREE SIGHT-READING</text>
    </g>
  </g>

  <text x="70" y="72" font-size="20" fill="#8b949e" letter-spacing="2">Sightline  ·  brand concept</text>
</svg>
